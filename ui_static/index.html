<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>DataGuard Demo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style> body{padding:20px;} pre{white-space:pre-wrap;} </style>
</head>
<body>
  <div class="container">
    <h1>DataGuard — Real vs Synthetic Detector</h1>
    <p>Backend endpoints: /predict/text , /predict/image</p>

    <div class="row">
      <div class="col-md-6">
        <h4>Text detection</h4>
        <textarea id="txt" class="form-control" rows="8" placeholder="Paste text here..."></textarea>
        <button id="btnText" class="btn btn-primary mt-2">Analyze Text</button>
        <pre id="txtOut" class="mt-2"></pre>
      </div>
      <div class="col-md-6">
        <h4>Image detection</h4>
        <input id="imgFile" type="file" accept="image/*" class="form-control"/>
        <button id="btnImg" class="btn btn-primary mt-2">Analyze Image</button>
        <pre id="imgOut" class="mt-2"></pre>
      </div>
    </div>
  </div>

<script>
document.getElementById('btnText').onclick = async () => {
  const text = document.getElementById('txt').value;
  document.getElementById('txtOut').innerText = "Processing...";
  const res = await fetch('/predict/text', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({text})
  });
  const j = await res.json();
  document.getElementById('txtOut').innerText = JSON.stringify(j, null, 2);
};

document.getElementById('btnImg').onclick = async () => {
  const file = document.getElementById('imgFile').files[0];
  if (!file) { alert("Choose an image file first"); return; }
  const fd = new FormData();
  fd.append('image', file);
  document.getElementById('imgOut').innerText = "Uploading & processing...";
  const res = await fetch('/predict/image', { method: 'POST', body: fd });
  const j = await res.json();
  document.getElementById('imgOut').innerText = JSON.stringify(j, null, 2);
};
</script>
</body>
</html>
